<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel = "stylesheet" href = "style.css">
    <title>Rock Paper Scissors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">
    <script src = "game.js" defer>
    </script>
</head>
<body>
        <div class = "header">
            <img src = './images/smudge.png' alt ="">
            <div class = "text header">
                <h2> Rock, Paper, Scissors </h2>
            </div>
        </div>
    <div class = "banner">
        <img src = './images/smudge.png' alt = "">
        <div class = "text info" id = "info">
            <h2> &#x2190 Click to begin playing...</h2>
        </div>
    </div>
    <div class = "left-buttons">
        <div class = "rock" id = "rockbutton">
            <img src = './images/rockbutton.png' alt = "rock">
        </div>
        <div class = "paper" id = "paperbutton">
            <img src = './images/paperbutton.png' alt = "paper">
        </div>
        <div class = "scissors" id = "scissorsbutton">
            <img src = './images/scissorsbutton.png' alt = "scissors">
        </div>
    </div>

    <div class = "characters">
        <div class = "boy normal" id = "boy">
            <img src = './images/boy.png' alt = "">
        </div>
        <div class = "boy attack-pose" id = "boy-attack">
            <img src = './images/boyattack.png' alt ="">
        </div>
        <div class = "robot normal" id = "robot">
            <img src = './images/robotnew.png' alt = "">
        </div>
        <div class = "robot attack-pose" id = "robot-attack">
            <img src = './images/robotattack.png' alt = "">
        </div>
    </div>

    <div class = "right-buttons">
        <div class = "rock">
            <img id = "rock-computer" src = './images/rockbutton.png' alt = "">
        </div>
        <div class = "paper">
            <img id = "paper-computer" src = './images/paperbutton.png' alt = "">
        </div>
        <div class = "scissors">
            <img id = "scissors-computer" src = './images/scissorsbutton.png' alt = "">
        </div>
    </div>

</body>
</html>
